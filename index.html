<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notepad — Link Manager</title>
<style>
  :root{
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e8eaed;
    --muted: #8b93a1;
    --accent: #5b8cff;
    --accent-2: #4dd4ac;
    --visited: #9a6bff;
    --danger: #ff6b6b;
    --radius: 12px;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1a2030 0%, var(--bg) 60%);
    color: var(--text);
    min-height:100vh;
    padding: 24px 16px 60px;
  }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
  }

  header{
    text-align:center;
    margin-bottom: 24px;
  }

  header h1{
    font-size: 1.6rem;
    margin: 0 0 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  header p{
    color: var(--muted);
    margin:0;
    font-size: 0.92rem;
  }

  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }

  label{
    display:block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  textarea{
    width:100%;
    min-height: 140px;
    resize: vertical;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
    font-size: 0.95rem;
    line-height: 1.5;
    font-family: inherit;
    outline: none;
    transition: border-color .15s ease;
  }

  textarea:focus{
    border-color: var(--accent);
  }

  .btn-row{
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  button{
    appearance: none;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 600;
    transition: transform .1s ease, opacity .15s ease;
  }

  button:active{ transform: scale(0.97); }

  .btn-primary{
    background: linear-gradient(90deg, var(--accent), #7aa2ff);
    color: #0b0e14;
  }

  .btn-secondary{
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-danger{
    background: transparent;
    color: var(--danger);
    border: 1px solid rgba(255,107,107,0.4);
  }

  button:hover{ opacity: 0.9; }

  .section-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 12px;
  }

  .section-title h2{
    font-size: 1rem;
    margin:0;
    color: var(--text);
  }

  .count-badge{
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 999px;
  }

  ol#outputList{
    list-style: none;
    counter-reset: linkCounter;
    margin:0;
    padding:0;
  }

  ol#outputList li{
    counter-increment: linkCounter;
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
  }

  ol#outputList li:last-child{ border-bottom:none; }

  ol#outputList li::before{
    content: counter(linkCounter) ".";
    color: var(--muted);
    font-weight: 700;
    font-size: 0.85rem;
    min-width: 22px;
    flex-shrink:0;
  }

  .link-block{
    display:flex;
    flex-direction:column;
    gap: 3px;
    min-width:0;
    flex:1;
  }

  .link-block a{
    color: var(--accent);
    text-decoration:none;
    word-break: break-all;
    font-size: 0.92rem;
    transition: color .2s ease;
  }

  .link-block a:hover{ text-decoration: underline; }

  .link-block a.visited{
    color: var(--visited);
  }

  .visit-count{
    font-size: 0.75rem;
    color: var(--muted);
  }

  .empty-state{
    color: var(--muted);
    font-size: 0.9rem;
    text-align:center;
    padding: 24px 10px;
  }

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 0.85rem;
    box-shadow: var(--shadow);
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 999;
  }

  .toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 480px){
    header h1{ font-size: 1.3rem; }
    .card{ padding: 14px; }
    button{ flex:1; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Smart Notepad</h1>
    <p>Paste links, auto-format them, track clicks, and copy cleanly.</p>
  </header>

  <div class="card">
    <label for="inputArea">Paste URLs (comma, space, or newline separated)</label>
    <textarea id="inputArea" placeholder="https://facebook.com/reel/123, https://facebook.com/watch/456
https://youtube.com/watch?v=xyz"></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="processBtn">Process Links</button>
      <button class="btn-secondary" id="copyBtn">Copy All Links</button>
      <button class="btn-danger" id="clearBtn">Clear All</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">
      <h2>Processed Links</h2>
      <span class="count-badge" id="countBadge">0 links</span>
    </div>
    <ol id="outputList"></ol>
    <div class="empty-state" id="emptyState">No links processed yet. Paste some above and hit "Process Links".</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // clickData persists click counts/visited state per URL for the session,
  // keyed by the raw URL string, so re-processing the same links keeps their stats.
  const clickData = {}; // { url: { count: number, visited: boolean } }

  const inputArea   = document.getElementById('inputArea');
  const processBtn  = document.getElementById('processBtn');
  const copyBtn     = document.getElementById('copyBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const outputList  = document.getElementById('outputList');
  const emptyState  = document.getElementById('emptyState');
  const countBadge  = document.getElementById('countBadge');
  const toast       = document.getElementById('toast');

  let currentLinks = []; // ordered array of URLs currently displayed

  /**
   * Extracts clean URLs from arbitrary pasted text.
   * This is the core "smart cleaning" step: because we only pull out
   * substrings that match a URL pattern, any surrounding numbering
   * (e.g. "1.") or metadata (e.g. "Visited: 3 times") is automatically
   * ignored rather than needing separate strip logic.
   */
  function extractUrls(rawText){
    if(!rawText) return [];

    // Matches http/https URLs, stopping at whitespace.
    const urlRegex = /https?:\/\/[^\s]+/g;
    let matches = rawText.match(urlRegex) || [];

    // Trim common trailing punctuation/artifacts that can get stuck to a URL
    // when it's copied from a sentence, list, or parenthetical.
    matches = matches.map(url => url.replace(/[),.;:!?\]}'"]+$/g, ''));

    // Remove duplicates while preserving first-seen order.
    const seen = new Set();
    const unique = [];
    for(const url of matches){
      if(!seen.has(url)){
        seen.add(url);
        unique.push(url);
      }
    }
    return unique;
  }

  function ensureClickEntry(url){
    if(!clickData[url]){
      clickData[url] = { count: 0, visited: false };
    }
    return clickData[url];
  }

  function renderLinks(){
    outputList.innerHTML = '';

    if(currentLinks.length === 0){
      emptyState.style.display = 'block';
      countBadge.textContent = '0 links';
      return;
    }

    emptyState.style.display = 'none';
    countBadge.textContent = currentLinks.length + (currentLinks.length === 1 ? ' link' : ' links');

    currentLinks.forEach(url => {
      const data = ensureClickEntry(url);

      const li = document.createElement('li');

      const block = document.createElement('div');
      block.className = 'link-block';

      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer'; // safe new-tab behavior; browser/OS still handles app deep-linking
      a.textContent = url;
      if(data.visited) a.classList.add('visited');

      const visitSpan = document.createElement('span');
      visitSpan.className = 'visit-count';
      visitSpan.textContent = 'Visited: ' + data.count + ' time' + (data.count === 1 ? '' : 's');

      a.addEventListener('click', () => {
        data.count += 1;
        data.visited = true;
        a.classList.add('visited');
        visitSpan.textContent = 'Visited: ' + data.count + ' time' + (data.count === 1 ? '' : 's');
      });

      block.appendChild(a);
      block.appendChild(visitSpan);
      li.appendChild(block);
      outputList.appendChild(li);
    });
  }

  function showToast(message){
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  processBtn.addEventListener('click', () => {
    const urls = extractUrls(inputArea.value);
    if(urls.length === 0){
      showToast('No valid links found');
      return;
    }
    currentLinks = urls;
    renderLinks();
    showToast(urls.length + ' link' + (urls.length === 1 ? '' : 's') + ' processed');
  });

  copyBtn.addEventListener('click', async () => {
    if(currentLinks.length === 0){
      showToast('Nothing to copy yet');
      return;
    }

    // Clean copy format: numbered list, plain URLs only — no click-count noise.
    const formatted = currentLinks
      .map((url, i) => (i + 1) + '. ' + url)
      .join('\n');

    try{
      await navigator.clipboard.writeText(formatted);
      showToast('Copied ' + currentLinks.length + ' links to clipboard');
    }catch(err){
      // Fallback for browsers/contexts without clipboard API access
      const temp = document.createElement('textarea');
      temp.value = formatted;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      showToast('Copied ' + currentLinks.length + ' links to clipboard');
    }
  });

  clearBtn.addEventListener('click', () => {
    inputArea.value = '';
    currentLinks = [];
    renderLinks();
    showToast('Cleared');
  });

  // Allow Ctrl/Cmd+Enter in the textarea as a quick shortcut to process links.
  inputArea.addEventListener('keydown', (e) => {
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
      processBtn.click();
    }
  });

  renderLinks();
})();
</script>

</body>
</html>
